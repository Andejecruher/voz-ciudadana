version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# VozCiudadana — docker-compose para desarrollo local
# Stack: NestJS + Prisma + PostgreSQL + Redis
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API NestJS (WhatsApp bot + Prisma) ─────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voz_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://voz:secret@postgres:5432/vozcuidadana
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: voz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voz
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: vozcuidadana
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voz -d vozcuidadana"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voz_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

# ── Volúmenes persistentes ────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
