# ─────────────────────────────────────────────────────────────────────────────
# VozCiudadana — docker-compose para dev/prod (profiles)
# Stack: Express + Prisma + PostgreSQL + Redis
# ─────────────────────────────────────────────────────────────────────────────

x-api-base: &api-base
  build:
    context: ./backend
    dockerfile: Dockerfile
    target: runner        # default para el anchor; cada servicio puede sobreescribir
  restart: unless-stopped

x-api-env: &api-env
  DATABASE_URL: ${DATABASE_URL:-postgresql://voz:secret@postgres:5432/vozcuidadana}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  PORT: ${PORT:-8000}

services:

  # ── API Express (WhatsApp bot + Prisma) ────────────────────────────────────
  api:
    <<: *api-base
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev           # imagen con devDependencies + ts-node-dev
    profiles:
      - dev
    env_file:
      - ./backend/.env
    environment:
      <<: *api-env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── API (prod) — usa variables de entorno externas ─────────────────────────
  api-prod:
    <<: *api-base
    profiles:
      - prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      PORT: ${PORT:-8000}
    ports:
      - "${API_PORT:-8000}:8000"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles:
      - dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: voz
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: vozcuidadana
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U voz -d vozcuidadana" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    profiles:
      - dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

# ── Volúmenes persistentes ────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
